name: Validate Playbook

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify required files exist
        run: |
          required_files=(
            README.md
            AGENTS.md
            CLAUDE.md
            AI_ENGINEERING_WORKFLOW.md
            REVIEW_STANDARD.md
            PLANNING_STANDARD.md
            EXECUTION_STANDARD.md
            GITHUB_PROJECT_STANDARD.md
            VERSION.md
            docs/ai-prompting/README.md
            docs/code-patterns/README.md
            docs/decision-log/README.md
            templates/README.md
            templates/new-repo-checklist.md
            templates/project-board-template.md
            templates/github-actions-template.yml
            commands/README.md
            commands/setup-from-playbook.md
            .github/ISSUE_TEMPLATE/bug_report.md
            .github/ISSUE_TEMPLATE/feature_request.md
            .github/ISSUE_TEMPLATE/playbook_improvement.md
            .github/PULL_REQUEST_TEMPLATE.md
            .github/workflows/validate-playbook.yml
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Check markdown links
        run: |
          find . -name '*.md' -not -path './.git/*' -print0 | while IFS= read -r -d '' file; do
            npx -y markdown-link-check -q -c .markdown-link-check.json "$file"
          done

      - name: Ensure VERSION.md is updated in pull requests
        if: github.event_name == 'pull_request'
        run: |
          changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.sha }}")
          echo "$changed_files"
          echo "$changed_files" | grep -qx 'VERSION.md'
